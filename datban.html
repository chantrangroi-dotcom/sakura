<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Dream - Đặt Bàn 3 Bước</title>
    <link rel="stylesheet" href="datban.css">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-mug-hot"></i> Coffee Dream
        </div>
        <nav>
            <a href="index.html"><i class="fa-solid fa-house"></i> Trang chủ</a>
            <a href="menu.html"><i class="fa-solid fa-mug-hot"></i> Menu</a>
            <a href="datban.html" class="active"><i class="fa-solid fa-calendar"></i> Đặt bàn</a>
            <a href="menu.html"><i class="fa-solid fa-cart-shopping"></i> Giỏ hàng</a>
            <a href="#"><i class="fa-solid fa-phone"></i> Liên hệ</a>
        </nav>
    </header>

    <div class="booking-container">
        <div class="booking-card">
            <h2>📅 Đặt Bàn Trực Tuyến</h2>
            
            <div class="progress-bar">
                <div class="step active" id="step-dot-1"><span>1</span><p>Cá nhân</p></div>
                <div class="step" id="step-dot-2"><span>2</span><p>Lịch hẹn</p></div>
                <div class="step" id="step-dot-3"><span>3</span><p>Ghi chú</p></div>
            </div>

            <form id="booking-form">
                
                <div class="form-step step-1 active">
                    <h3>Bước 1: Thông tin cá nhân</h3>
                    <div class="form-group">
                        <label><i class="fa-solid fa-user"></i> Họ và tên *</label>
                        <input type="text" id="booking-name" placeholder="Nhập họ và tên của bạn">
                        <span class="error-msg">Vui lòng nhập họ tên</span>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-phone"></i> Số điện thoại *</label>
                        <input type="tel" id="booking-phone" placeholder="Nhập số điện thoại để xác nhận">
                        <span class="error-msg">Vui lòng nhập số điện thoại hợp lệ</span>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn-next">Tiếp theo <i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </div>

                <div class="form-step step-2">
                    <h3>Bước 2: Chi tiết lịch hẹn</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fa-solid fa-calendar-days"></i> Chọn ngày *</label>
                            <input type="date" id="booking-date">
                        </div>
                        <div class="form-group">
                            <label><i class="fa-solid fa-clock"></i> Chọn giờ *</label>
                            <input type="time" id="booking-time" value="19:00">
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-users"></i> Số lượng người đi cùng *</label>
                        <select id="booking-guests">
                            <option value="1">1 Người</option>
                            <option value="2" selected>2 Người (Hẹn hò)</option>
                            <option value="4">4 Người (Gia đình)</option>
                            <option value="5-10">Nhóm đông (5 - 10 người)</option>
                            <option value="10+">Hội nghị / Tiệc lớn (Trên 10 người)</option>
                        </select>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn-prev"><i class="fa-solid fa-arrow-left"></i> Quay lại</button>
                        <button type="button" class="btn-next">Tiếp theo <i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </div>

                <div class="form-step step-3">
                    <h3>Bước 3: Yêu cầu đặc biệt</h3>
                    <div class="form-group">
                        <label><i class="fa-solid fa-comment-dots"></i> Ghi chú không gian & dịch vụ</label>
                        <textarea id="booking-notes" rows="4" placeholder="Ví dụ: Bàn view cửa sổ kính, bàn yên tĩnh làm việc, cần setup hoa hồng..."></textarea>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn-prev"><i class="fa-solid fa-arrow-left"></i> Quay lại</button>
                        <button type="submit" class="btn-submit">Xác Nhận Đặt Bàn <i class="fa-solid fa-circle-check"></i></button>
                    </div>
                </div>

            </form>
        </div>
    </div>

    <footer>
        <div>© 2026 Coffee Dream</div>
        <div>
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-tiktok"></i>
            <i class="fa-brands fa-youtube"></i>
        </div>
    </footer>

    <script type="module" src="datban.js"></script>
</body>
</html>
