<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Premium</title>

    <!-- CSS -->
    <link rel="stylesheet" href="index.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- LEFT -->
        <div class="left-panel">

            <div class="logo">
                <i class="fa-solid fa-chart-simple"></i>
            </div>

            <h1>BỘ ĐẾM THÔNG MINH</h1>

            <p>
                Ứng dụng Counter sử dụng HTML, CSS và jQuery.
                <br>
                Thiết kế hiện đại với hiệu ứng động đẹp mắt.
            </p>

            <div class="line"></div>

            <div class="info-box">

                <div>
                    <h2 id="plusCount">0</h2>
                    <span>Lần tăng</span>
                </div>

                <div>
                    <h2 id="minusCount">0</h2>
                    <span>Lần giảm</span>
                </div>

            </div>

        </div>

        <!-- CENTER -->
        <div class="center-panel">

            <div class="circle">
                <h1 id="counter">0</h1>
            </div>

            <div class="status" id="statusText">
                Giá trị hiện tại
            </div>

            <div class="buttons">

                <button id="increase">
                    <i class="fa-solid fa-plus"></i>
                    Tăng
                </button>

                <button id="decrease">
                    <i class="fa-solid fa-minus"></i>
                    Giảm
                </button>

                <button id="reset">
                    <i class="fa-solid fa-rotate-right"></i>
                    Reset
                </button>

            </div>

        </div>

        <!-- RIGHT -->
        <div class="right-panel">

            <h2>TÍNH NĂNG</h2>

            <div class="feature">
                <i class="fa-solid fa-bolt"></i>
                <span>Cập nhật realtime</span>
            </div>

            <div class="feature">
                <i class="fa-solid fa-palette"></i>
                <span>Thiết kế hiện đại</span>
            </div>

            <div class="feature">
                <i class="fa-solid fa-arrow-down"></i>
                <span>Cho phép số âm</span>
            </div>

            <div class="feature">
                <i class="fa-solid fa-star"></i>
                <span>Animation mượt mà</span>
            </div>

            <div class="feature">
                <i class="fa-solid fa-code"></i>
                <span>jQuery chuyên nghiệp</span>
            </div>

        </div>

    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- JS -->
    <script src="index.js"></script>

</body>
</html>
