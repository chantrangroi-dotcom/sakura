<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Rabin Karp Demo</title>

    <link rel="stylesheet" href="demo.css">

</head>

<body>

    <!-- CLOUDS -->

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <div class="container">

        <h1>
            🔥 DEMO THUẬT TOÁN RABIN-KARP 🔥
        </h1>

        <!-- PANEL -->

        <div class="panel">

            <div class="input-box">

                <label>
                    Chuỗi văn bản
                </label>

                <input
                    type="text"
                    id="text"
                    value="ABCCDDAEFG">

            </div>

            <div class="input-box">

                <label>
                    Mẫu cần tìm
                </label>

                <input
                    type="text"
                    id="pattern"
                    value="CDD">

            </div>

            <div class="button-group">

                <button onclick="startDemo()">
                    ▶ AUTO RUN
                </button>

                <button onclick="nextStep()">
                    ⏭ NEXT
                </button>

                <button onclick="prevStep()">
                    ⏮ PREV
                </button>

                <button onclick="resetDemo()">
                    🔄 RESET
                </button>

            </div>

        </div>

        <!-- VISUAL -->

        <div class="visual-area">

            <div class="tag">
                TEXT
            </div>

            <div
                class="row"
                id="textRow">
            </div>

            <div class="tag">
                PATTERN
            </div>

            <div
                class="row pattern-row"
                id="patternRow">
            </div>

        </div>

        <!-- STATUS -->

        <div class="status-box">

            <h2>
                📖 GIẢI THÍCH
            </h2>

            <div id="status">

                🤖 Sẵn sàng demo...

            </div>

        </div>

    </div>

    <script src="demo.js"></script>

</body>

</html>
